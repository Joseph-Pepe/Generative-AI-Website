<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Music Generator</title>
    <style>
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            max-width: 600px; 
            margin: 50px auto; 
            padding: 20px; 
            background-color: #121212; 
            color: #ffffff; 
        }
        h1 { text-align: center; }
        textarea { 
            width: 100%; 
            height: 100px; 
            padding: 15px; 
            margin-bottom: 20px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background-color: #222; 
            color: #fff; 
            font-size: 16px;
            box-sizing: border-box;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background-color: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
            transition: background-color 0.2s;
        }
        button:hover { background-color: #1557b0; }
        button:disabled { 
            background-color: #555; 
            cursor: not-allowed; 
        }
        #status { 
            margin-top: 15px; 
            text-align: center; 
            color: #aaa; 
            font-size: 14px;
        }
        #player-container { 
            margin-top: 30px; 
            text-align: center; 
            display: none; 
            background: #222;
            padding: 20px;
            border-radius: 8px;
        }
        audio { width: 100%; margin-top: 10px; margin-bottom: 15px; }
        
        #downloadBtn {
            display: none; 
            padding: 10px 20px;
            background-color: #34a853; 
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        #downloadBtn:hover { background-color: #2b803e; }

        /* --- New History Styles --- */
        #history-container {
            margin-top: 40px;
            background: #222;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        #history-container h3 {
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }
        .history-item {
            padding: 12px 0;
            border-bottom: 1px solid #333;
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .history-date {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }
        .history-prompt {
            font-size: 14px;
            color: #ddd;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1>🎵 AI Music Generator</h1>
    
    <textarea id="prompt" placeholder="Describe your song... (e.g., An atmospheric ambient track with soft synths, sweeping strings, and a slow, calming tempo.)"></textarea>
    
    <button id="generateBtn" onclick="generateMusic()">Generate Track</button>
    
    <div id="status">Ready to generate.</div>
    
    <div id="player-container">
        <h3>✨ Your Generated Track</h3>
        <audio id="audioPlayer" controls></audio>
        <br>
        <a id="downloadBtn" download="gemini_generated_track.mp3">⬇️ Download MP3</a>
    </div>

    <div id="history-container">
        <h3>📜 Recent Prompts</h3>
        <div id="historyList">Loading history...</div>
    </div>

    <script>
        // Fetch history when the page loads
        window.onload = fetchHistory;

        async function fetchHistory() {
            try {
                const response = await fetch('/api/history');
                const historyList = document.getElementById('historyList');
                
                if (response.ok) {
                    const data = await response.json();
                    
                    if (data.length === 0) {
                        historyList.innerHTML = '<div class="history-item"><div class="history-prompt">No generations yet.</div></div>';
                        return;
                    }

                    // Map the PostgreSQL rows into HTML elements
                    historyList.innerHTML = data.map(item => `
                        <div class="history-item">
                            <div class="history-date">${new Date(item.created_at).toLocaleString()}</div>
                            <div class="history-prompt">"${item.prompt}"</div>
                        </div>
                    `).join('');
                } else {
                    historyList.innerHTML = '<div class="history-item"><div class="history-prompt" style="color: #ff6b6b;">Failed to load history.</div></div>';
                }
            } catch (error) {
                console.error('Error fetching history:', error);
            }
        }

        async function generateMusic() {
            const promptInput = document.getElementById('prompt').value.trim();
            const btn = document.getElementById('generateBtn');
            const status = document.getElementById('status');
            const playerContainer = document.getElementById('player-container');
            const audioPlayer = document.getElementById('audioPlayer');
            const downloadBtn = document.getElementById('downloadBtn');

            if (!promptInput) {
                alert('Please enter a prompt first!');
                return;
            }

            // 1. Set loading state
            btn.disabled = true;
            btn.innerText = 'Generating... (This may take a minute)';
            status.innerText = 'Sending prompt to Gemini API...';
            playerContainer.style.display = 'none';
            downloadBtn.style.display = 'none'; 

            try {
                // 2. Call your Express backend
                const response = await fetch('/api/generate-music', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: promptInput })
                });

                // 3. Handle the response
                if (response.ok) {
                    const blob = await response.blob();
                    const audioUrl = URL.createObjectURL(blob);
                    
                    audioPlayer.src = audioUrl;
                    downloadBtn.href = audioUrl;
                    downloadBtn.style.display = 'inline-block'; 
                    
                    playerContainer.style.display = 'block';
                    status.innerText = 'Generation complete!';
                    audioPlayer.play();

                    // Refresh the history list immediately after success
                    fetchHistory();
                } else {
                    const errorData = await response.json();
                    status.innerText = '❌ Generation failed.';
                    alert("Error: " + errorData.error);
                }
            } catch (error) {
                status.innerText = '❌ Network error.';
                alert("A network error occurred. Make sure your Node server is running!");
            } finally {
                // 4. Reset the generate button
                btn.disabled = false;
                btn.innerText = 'Generate Track';
            }
        }
    </script>
</body>
</html>
